<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
  <title>Profay Codesite - Sign In</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4fff4;
    }

    .wrapper{
      width:100%;
      max-width:420px;
    }

    .title{
      text-align:center;
      color:white;
      background:linear-gradient(to right, green, lawngreen);
      padding:15px;
      border-radius:15px;
      margin-bottom:20px;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border:2px solid #ddd;
      border-radius:12px;
    }

    input:focus{
      border-color:green;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:green;
      color:white;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:lawngreen;
      color:#111;
    }

    #output{
      margin-top:15px;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <h1 class="title">💻 Profay Codesite</h1>

    <div class="container">

      <h3>Sign In</h3>

      <form onsubmit="signin(event)">

        <input id="name" type="text" placeholder="Enter your name" required>
        <input id="email" type="email" placeholder="Enter your email" required>
        <input id="password" type="password" placeholder="Enter password" required>

        <button type="submit">Sign In</button>

      </form>

      <p id="output"></p>

    </div>

  </div>

  <script>

    function signin(event){
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(name && email && password){

        // SAVE USER
        localStorage.setItem("userName", name);
        localStorage.setItem("userEmail", email);

        document.getElementById("output").style.color = "green";
        document.getElementById("output").innerText = "Login successful 🚀";

        setTimeout(()=>{
          window.location.href = "main.html";
        }, 1000);

      } else {
        document.getElementById("output").style.color = "red";
        document.getElementById("output").innerText = "Please fill all fields.";
      }
    }

  </script>

</body>
</html>
