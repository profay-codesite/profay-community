<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profay Codesite - Sign In</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4fff4;
      padding:20px;
    }

    /* MAIN BOX */

    .wrapper{
      width:100%;
      max-width:420px;
    }

    /* HEADER */

    .title{
      text-align:center;
      color:white;
      background:linear-gradient(to right, green, lawngreen);
      padding:15px;
      border-radius:15px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    /* FORM CARD */

    .container{
      background:white;
      padding:30px 25px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      animation:fadeIn 0.8s ease;
    }

    .myp{
      text-align:center;
      color:green;
      font-size:20px;
      font-weight:bold;
      margin-bottom:25px;
    }

    /* INPUTS */

    .input-box{
      margin-bottom:18px;
    }

    input{
      width:100%;
      padding:14px;
      border:2px solid #ddd;
      border-radius:12px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    input:focus{
      border-color:green;
      box-shadow:0 0 10px rgba(0,128,0,0.2);
    }

    /* BUTTON */

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:green;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:lawngreen;
      transform:scale(1.02);
    }

    /* OUTPUT */

    #output{
      margin-top:20px;
      text-align:center;
      font-weight:bold;
    }

    /* CONTINUE LINK */

    .continue-link{
      display:block;
      margin-top:20px;
      text-decoration:none;
    }

    /* ANIMATION */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* MOBILE */

    @media(max-width:480px){

      .title{
        font-size:20px;
      }

      .container{
        padding:25px 18px;
      }

      .myp{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

  <div class="wrapper">

    <!-- HEADER -->

    <h1 class="title">💻 Profay Codesite</h1>

    <!-- FORM -->

    <div class="container">

      <p class="myp">
        Sign in temporarily to continue
      </p>

      <form onsubmit="signin(event)">

        <div class="input-box">
          <input
            id="name"
            type="text"
            placeholder="Enter your name"
            required
          >
        </div>

        <div class="input-box">
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="input-box">
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit">
          Sign In
        </button>

      </form>

      <p id="output"></p>

      <!-- CONTINUE -->

      <a href="main.html" class="continue-link">

        <button>
          Continue
        </button>

      </a>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    function signin(event){

      event.preventDefault();

      let name =
      document.getElementById("name").value.trim();

      let email =
      document.getElementById("email").value.trim();

      let password =
      document.getElementById("password").value.trim();

      let output =
      document.getElementById("output");

      if(name && email && password){

        output.innerHTML =
        `Welcome ${name} 🎉`;

        output.style.color = "green";

      }

      else{

        output.innerHTML =
        "Please fill all fields.";

        output.style.color = "red";

      }

    }

  </script>

</body>

</html>
